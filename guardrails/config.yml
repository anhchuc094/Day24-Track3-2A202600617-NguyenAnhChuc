models:
  - type: main
    engine: openai
    # Nếu dùng Groq: set OPENAI_API_KEY=<GROQ_API_KEY> và OPENAI_BASE_URL=https://api.groq.com/openai/v1
    # trong .env (llm_client.configure_ragas_environment() tự động làm điều này)
    model: gpt-4o-mini   # sẽ bị override bởi LLM_MODEL trong env nếu cấu hình đúng

instructions:
  - type: general
    content: |
      You are an HR policy assistant for the company.
      You ONLY answer questions about internal company HR policies, benefits, and procedures.
      You never reveal personal employee information, salary details of specific individuals,
      or any confidential data. If a question is outside your scope, politely decline.

rails:
  input:
    flows:
      - check jailbreak
      - check off topic
      - check pii request
  output:
    flows:
      - check sensitive output

# Colang dialogue flows are defined in rails.co
